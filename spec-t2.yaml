# LoRA Speedrun — Track 2 spec (machine-readable, single source of truth for t2).
# Deliberately contrasts Track 1: different model family (SmolLM2, not Qwen) and a
# different task type (extractive QA, not math) — so techniques must TRANSFER to hold
# records on both tracks. Same hardware, caps, and verification rules as Track 1.

version: 1
track_id: t2
track: squad-smollm2-1.7b-l40s

base_model: HuggingFaceTB/SmolLM2-1.7B
# Commit SHA recorded in harness/pins-t2.json by prefetch; enforced at verification.

dataset:
  repo: rajpurkar/squad
  config: plain_text
  train_split: train        # 87,599 examples — the ONLY allowed training data
  eval_split: validation    # 10,570 questions — touching this during training = ban
  local_prefix: squad       # data dirs: data/squad_train, data/squad_test

# FROZEN 2026-07-20 (tag: spec-t2-frozen). Calibrated from the maintainer's t2 baseline
# on spec hardware (77.50% EM observed, minus ~2pts headroom for seed variance).
target_accuracy: 0.755      # exact match (official SQuAD normalization)

constraints:
  max_trainable_params: 30000000
  max_train_wallclock_minutes: 60
  gpu: "NVIDIA L40S"
  gpu_count: 1
  vram_gb: 48
  platform: "Modal Sandbox (block_network=true) — see harness/modal_verify.py"

eval:
  # Fixed evaluation protocol — identical for every submission.
  evaluator: squad          # harness/evaluate_squad.py
  prompt_format: "Context: {context}\nQuestion: {question}\nAnswer:"
  decoding: greedy
  dtype: bfloat16
  max_new_tokens: 32
  batch_size: 128
  metric: exact_match       # vs ANY gold answer, official SQuAD normalization

verification:
  n_runs: 3
  seeds: fresh-per-verification
  pass_rule: all_runs_must_clear_target
  official_time: mean_of_runs     # after dropping infrastructure-noise outliers (below)
  # A run whose TRAINING wall-clock exceeds 1.5x the batch median while its accuracy is
  # normal (it still cleared the target) is an infrastructure I/O stall, not algorithmic
  # time: its time is dropped from the official mean and the run is re-run. Never drops
  # below 2 timed runs, and only ever drops an accuracy-passing run — a genuinely slow
  # algorithm is never hidden. The benchmark measures the algorithm, not the datacenter's
  # disk on a bad day. Implemented in harness/run_submission.py (official_train_time).
  infra_outlier_rule: drop_time_and_rerun_if_wallclock_gt_1.5x_batch_median_at_normal_accuracy
  # Anti-resampling: one verification per code state. Re-verification only after a code
  # change, and the verifier draws fresh seeds each time — so a submitter cannot re-request
  # /verify until a lucky batch comes back (that would cherry-pick the clock, not just the
  # accuracy gate). See JUDGING.md.
  one_verification_per_code_state: true
