author: Sai Vineeth
github: Saivineeth147
description: "Pipeline dry-run: identical copy of the baseline. Not a record attempt — will be closed unmerged."
base_model: Qwen/Qwen2.5-1.5B
technique: lora

hyperparameters:
  rank: 16
  alpha: 32
  dropout: 0.0
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  learning_rate: 2.0e-4
  schedule: cosine, warmup_ratio 0.03
  optimizer: adamw_torch_fused
  epochs_or_steps: 3 epochs
  effective_batch_size: 128 (8 x grad_accum 16)
  max_seq_len: 768

extra_pip_packages: []
