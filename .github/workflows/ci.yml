name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Validate all submissions (structure, schema, no weight files)
        run: python harness/validate_submission.py --all
      - name: Leaderboard in sync with records.json
        run: python scripts/update_leaderboard.py --check
      - name: Harness compiles
        run: python -m py_compile harness/*.py scripts/update_leaderboard.py submissions/000-baseline/train.py
